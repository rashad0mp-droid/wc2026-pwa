name: Update World Cup scores

# HOW THIS MAKES THE APP SELF-UPDATING:
# 1. This workflow runs on a schedule (every 10 min below).
# 2. It fetches live fixtures and rewrites data/matches.json.
# 3. If anything changed, it commits the file back to the repo.
# 4. Vercel sees the push and auto-redeploys — so the live site updates itself.
#
# SETUP (one time):
#   Repo → Settings → Secrets and variables → Actions → New repository secret
#     Name:  APIFOOTBALL_KEY      Value: <your api-sports.io key>
#   Also: Settings → Actions → General → Workflow permissions → "Read and write permissions".

on:
  schedule:
    - cron: '*/10 * * * *'   # every 10 minutes (UTC). GitHub may delay during busy periods.
  workflow_dispatch: {}        # lets you also run it by hand from the Actions tab

# avoid overlapping runs
concurrency:
  group: update-scores
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch & map scores
        env:
          APIFOOTBALL_KEY: ${{ secrets.APIFOOTBALL_KEY }}
        run: node scripts/update.mjs

      - name: Commit if changed
        run: |
          if [[ -n "$(git status --porcelain data/matches.json)" ]]; then
            git config user.name  "wc26-bot"
            git config user.email "actions@github.com"
            git add data/matches.json
            git commit -m "live: update scores [skip ci]"
            git push
          else
            echo "Nothing to commit."
          fi
